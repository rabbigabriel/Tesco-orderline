<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesco List Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tesco-blue: #00539f;
    --tesco-red: #ee1c24;
    --ink: #1a1a1a;
    --mid: #555;
    --rule: #d0d0d0;
    --bg: #f5f3ee;
    --paper: #fdfcf8;
  }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  .container { width: 100%; max-width: 560px; }

  header {
    border-top: 4px solid var(--tesco-blue);
    border-bottom: 2px solid var(--tesco-blue);
    padding: 1rem 0 0.75rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--tesco-blue);
  }

  header .subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--mid);
    font-size: 1rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    height: 140px;
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    padding: 0.75rem;
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--tesco-blue); }
  textarea::placeholder { color: #aaa; font-style: italic; }

  .hint {
    margin-top: 0.4rem;
    font-size: 0.68rem;
    color: #999;
    letter-spacing: 0.04em;
  }

  .btn {
    display: inline-block;
    padding: 0.7rem 1.6rem;
    background: var(--tesco-blue);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: #003f7a; }
  .btn:active { background: #002f5c; }

  .btn-red { background: var(--tesco-red); }
  .btn-red:hover { background: #c0151b; }

  .btn-secondary {
    background: transparent;
    color: var(--mid);
    border: 1.5px solid var(--rule);
  }
  .btn-secondary:hover { background: #ece9e2; border-color: #bbb; }

  #entry-screen .btn { margin-top: 1.25rem; }

  #runner-screen { display: none; }

  .progress-bar-wrap {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--tesco-blue);
    transition: width 0.3s ease;
  }

  .counter {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 0.35rem;
  }

  .current-item {
    font-family: 'Crimson Pro', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }

  .queue-preview {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 1.5rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  /* Add items inline */
  .add-section {
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    background: var(--paper);
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .add-toggle {
    width: 100%;
    text-align: left;
    padding: 0.55rem 0.85rem;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: background 0.15s;
  }

  .add-toggle:hover { background: #ece9e2; }

  .add-toggle .chevron {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
  }

  .add-toggle.open .chevron { transform: rotate(90deg); }

  .add-panel {
    display: none;
    padding: 0.75rem;
    border-top: 1px solid var(--rule);
  }

  .add-panel.open { display: block; }

  .add-row {
    display: flex;
    gap: 0.5rem;
  }

  .add-row input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    padding: 0.5rem 0.65rem;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus { border-color: var(--tesco-blue); }
  .add-row input::placeholder { color: #bbb; font-style: italic; }

  .add-row .btn { padding: 0.5rem 1rem; font-size: 0.7rem; }

  .add-hint {
    margin-top: 0.4rem;
    font-size: 0.65rem;
    color: #bbb;
    letter-spacing: 0.03em;
  }

  /* flash confirmation */
  .add-confirm {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--tesco-blue);
    margin-top: 0.4rem;
    min-height: 1.2em;
    transition: opacity 0.4s;
  }

  .list-section { border-top: 1.5px solid var(--rule); padding-top: 1.25rem; }

  .list-section-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 0.75rem;
  }

  ol { list-style: none; counter-reset: item-counter; }

  ol li {
    counter-increment: item-counter;
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #ede9e0;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    color: var(--mid);
  }

  ol li::before {
    content: counter(item-counter, decimal-leading-zero);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: #ccc;
    min-width: 1.8rem;
    text-align: right;
    flex-shrink: 0;
  }

  ol li.done { text-decoration: line-through; color: #ccc; }
  ol li.active { color: var(--ink); font-weight: 600; }

  .done-msg { text-align: center; padding: 2rem 0; }
  .done-msg .tick { font-size: 2.5rem; color: var(--tesco-blue); margin-bottom: 0.5rem; }
  .done-msg p { font-family: 'Crimson Pro', serif; font-style: italic; color: var(--mid); margin-bottom: 1.25rem; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Tesco List Runner</h1>
    <span class="subtitle">one item at a time</span>
  </header>

  <!-- ENTRY -->
  <div id="entry-screen">
    <label for="list-input">Your shopping list</label>
    <textarea id="list-input" placeholder="eggs, semi-skimmed milk, mature cheddar, pasta bake, tin tomatoes…"></textarea>
    <p class="hint">Comma-separated. Items will be searched on Tesco in order.</p>
    <button class="btn btn-red" onclick="startList()">Start shopping</button>
  </div>

  <!-- RUNNER -->
  <div id="runner-screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>

    <div class="counter" id="counter"></div>
    <div class="current-item" id="current-item"></div>
    <div class="queue-preview" id="queue-preview"></div>

    <div class="actions">
      <button class="btn btn-red" onclick="searchCurrent()">Search on Tesco</button>
      <button class="btn" onclick="nextItem()">Next item &rarr;</button>
      <button class="btn btn-secondary" onclick="skipItem()">Skip</button>
      <button class="btn btn-secondary" onclick="resetAll()">Start over</button>
    </div>

    <!-- ADD ITEMS -->
    <div class="add-section">
      <button class="add-toggle" id="add-toggle" onclick="toggleAddPanel()">
        <span class="chevron">&#9654;</span> Add items to list
      </button>
      <div class="add-panel" id="add-panel">
        <div class="add-row">
          <input type="text" id="add-input" placeholder="bread, butter, yoghurt…" onkeydown="if(event.key==='Enter') addItems()">
          <button class="btn" onclick="addItems()">Add</button>
        </div>
        <p class="add-hint">Comma-separated – items will be appended to the end of the list.</p>
        <div class="add-confirm" id="add-confirm"></div>
      </div>
    </div>

    <div class="list-section">
      <div class="list-section-label">Full list</div>
      <ol id="item-list"></ol>
    </div>
  </div>

</div>

<script>
  let items = [];
  let current = 0;
  let tescoTab = null;

  function buildUrl(term) {
    return 'https://www.tesco.com/groceries/en-GB/search?query=' + encodeURIComponent(term.trim()) + '&inputType=free+text';
  }

  function startList() {
    const raw = document.getElementById('list-input').value;
    items = raw.split(',').map(s => s.trim()).filter(Boolean);
    if (!items.length) { alert('Please enter at least one item.'); return; }
    current = 0;
    document.getElementById('entry-screen').style.display = 'none';
    document.getElementById('runner-screen').style.display = 'block';
    renderRunner();
    searchCurrent();
  }

  function searchCurrent() {
    const url = buildUrl(items[current]);
    if (tescoTab && !tescoTab.closed) {
      tescoTab.location.href = url;
      tescoTab.focus();
    } else {
      tescoTab = window.open(url, 'tesco-runner');
    }
  }

  function renderRunner() {
    const total = items.length;
    const pct = total > 1 ? (current / (total - 1)) * 100 : 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('counter').textContent = 'Item ' + (current + 1) + ' of ' + total;
    document.getElementById('current-item').textContent = items[current];

    const next = items.slice(current + 1, current + 4).join(', ');
    document.getElementById('queue-preview').textContent = next
      ? 'Next: ' + next + (items.length > current + 4 ? '…' : '')
      : 'Last item';

    const ol = document.getElementById('item-list');
    ol.innerHTML = '';
    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.textContent = item;
      if (i < current) li.classList.add('done');
      else if (i === current) li.classList.add('active');
      ol.appendChild(li);
    });
  }

  function nextItem() {
    if (current < items.length - 1) {
      current++;
      renderRunner();
      searchCurrent();
    } else {
      showDone();
    }
  }

  function skipItem() {
    if (current < items.length - 1) {
      current++;
      renderRunner();
    } else {
      showDone();
    }
  }

  function toggleAddPanel() {
    const toggle = document.getElementById('add-toggle');
    const panel = document.getElementById('add-panel');
    const open = panel.classList.toggle('open');
    toggle.classList.toggle('open', open);
    if (open) document.getElementById('add-input').focus();
  }

  function addItems() {
    const raw = document.getElementById('add-input').value;
    const newItems = raw.split(',').map(s => s.trim()).filter(Boolean);
    if (!newItems.length) return;
    items = items.concat(newItems);
    document.getElementById('add-input').value = '';
    renderRunner();

    const confirm = document.getElementById('add-confirm');
    confirm.textContent = newItems.length === 1
      ? '"' + newItems[0] + '" added to list.'
      : newItems.length + ' items added to list.';
    setTimeout(() => { confirm.textContent = ''; }, 3000);
  }

  function showDone() {
    document.getElementById('runner-screen').innerHTML = `
      <div class="done-msg">
        <div class="tick">&#10003;</div>
        <p>All ${items.length} item${items.length !== 1 ? 's' : ''} done. Happy cooking.</p>
        <button class="btn" onclick="resetAll()">New list</button>
      </div>`;
  }

  function resetAll() {
    items = [];
    current = 0;
    tescoTab = null;
    document.getElementById('list-input').value = '';
    document.getElementById('runner-screen').style.display = 'none';
    document.getElementById('entry-screen').style.display = 'block';
  }
</script>
</body>
</html>
